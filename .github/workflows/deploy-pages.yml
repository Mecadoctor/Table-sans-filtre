# Publique le dossier dist/ sur la branche gh-pages (fichiers déjà buildés — pas l’index dev du repo).
#
# Sur GitHub : Settings → Pages → Build and deployment → Source :
#   « Deploy from a branch » → Branch : gh-pages → Folder : / (root)
#
# Si le workflow ne peut pas pousser : Settings → Actions → General →
# « Workflow permissions » → Read and write permissions (nécessaire pour gh-pages).

name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_ACCESS_CODES: TSF2026
          VITE_CALENDLY_URL: https://calendly.com/wenov/la_table_sans_filtre?back=1

      - name: Vérifier que le build est bien la prod (pas src/main.tsx)
        run: |
          test -f dist/index.html
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error title=Build invalide::dist/index.html contient encore l'entrée Vite dev"
            exit 1
          fi
          if ! grep -q '/Table-sans-filtre/assets/' dist/index.html; then
            echo "::error title=Build invalide::aucun script /Table-sans-filtre/assets/ dans index.html"
            exit 1
          fi
          echo "OK — bundle prod détecté"

      - name: Pousser dist vers la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
